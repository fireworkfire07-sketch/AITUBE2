name: Solomon Wealth — Daily Video

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Generate and upload
        env:
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python generate_video.py
      - name: Commit processed list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add islenmis.txt || true
          git diff --cached --quiet || git commit -m "chore: mark topic processed [skip ci]"
          git push
