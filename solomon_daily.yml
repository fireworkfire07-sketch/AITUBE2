name: Solomon Wealth — Daily Video

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests edge-tts faster-whisper

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Generate video
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python generate_video.py

      - name: Commit processed list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add islenmis.txt || true
          git diff --cached --quiet || git commit -m "chore: mark topic processed [skip ci]"
          git push
