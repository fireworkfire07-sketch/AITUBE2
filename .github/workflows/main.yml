name: Aitube 2 - Otomatik Video

on:
  schedule:
    - cron: '0 7 * * *'      # her gün 07:00 UTC (10:00 TR)
  workflow_dispatch:          # elle tetikleme

jobs:
  uret:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # islenmis.txt'yi geri commit'lemek için ŞART
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ffmpeg kur
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Bağımlılıkları kur
        run: pip install -r requirements.txt

      - name: Video üret ve yükle
        env:
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          YT2_CLIENT_ID:     ${{ secrets.YT2_CLIENT_ID }}
          YT2_CLIENT_SECRET: ${{ secrets.YT2_CLIENT_SECRET }}
          YT2_REFRESH_TOKEN: ${{ secrets.YT2_REFRESH_TOKEN }}
        run: python main.py

      - name: İşlenmiş listesini kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add islenmis.txt
          git commit -m "islenmis guncellendi" || echo "degisiklik yok"
          git push
